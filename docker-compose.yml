version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: alta-cafe-db
    environment:
      POSTGRES_DB: altacafe
      POSTGRES_USER: altacafe
      POSTGRES_PASSWORD: altacafe123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/infrastructure/database/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_initial_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U altacafe"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
